<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaidur Rahman</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Shaidur</h2>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 id="typing"></h1>
    <p>Software Engineer | Laravel Developer</p>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Projects</h2>
    <div class="grid" id="github-projects"></div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>

    <form name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
    </div>
</div>

<footer>
    <p>© 2026 Shaidur Rahman</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init();

    /* 🔥 Typing Animation */
    const text = "Md. Shaidur Rahman";
    let i = 0;
    function typing() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 80);
        }
    }
    typing();

    /* 🔥 GitHub API */
    fetch("https://api.github.com/users/Shaid1998/repos")
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById("github-projects");

            data.slice(0,6).forEach(repo => {
                const div = document.createElement("div");
                div.classList.add("card");

                div.innerHTML = `
        <h3>${repo.name}</h3>
        <p>${repo.description || "No description"}</p>
        <button onclick="openModal('${repo.name}', '${repo.description}')">Details</button>
        <a href="${repo.html_url}" target="_blank">GitHub</a>
      `;

                container.appendChild(div);
            });
        });

    /* 🔥 Modal */
    function openModal(title, desc) {
        document.getElementById("modal").style.display = "block";
        document.getElementById("modal-title").innerText = title;
        document.getElementById("modal-desc").innerText = desc;
    }

    document.getElementById("close").onclick = () => {
        document.getElementById("modal").style.display = "none";
    }
</script>

</body>
</html>
